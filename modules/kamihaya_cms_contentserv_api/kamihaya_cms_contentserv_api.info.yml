name: 'Kamihaya CMS Contentserv API'
type: module
core_version_requirement: ^9 || ^10
package: 'Kamihaya CMS'
description: 'Synchronize data with Contentserv.'

dependencies:
  - drupal:datetime
  - commerce:commerce
  - commerce:commerce_product
  - commerce:commerce_product
  - kamihaya_cms_common:kamihaya_cms_common

configure: kamihaya_cms_contentserv_api.settings

interface translation project: kamihaya_cms_contentserv_api
interface translation server pattern: profiles/contrib/kamihaya_cms/modules/kamihaya_cms_contentserv_api/translations/%language.po
